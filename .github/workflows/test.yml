name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: npm ci
      - run: npm test
      - run: cargo test --workspace

  minio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Start MinIO
        run: |
          docker run -d --name icescope-minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:9000/minio/health/live && exit 0
            sleep 2
          done
          docker logs icescope-minio
          exit 1

      - name: Create MinIO bucket
        run: |
          docker run --rm --network host minio/mc:latest \
            sh -c 'mc alias set local http://127.0.0.1:9000 minioadmin minioadmin && mc mb -p local/icescope'

      - name: Run ignored MinIO integration tests
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
        run: cargo test -p icescope-core --test minio_s3 -- --ignored --nocapture
