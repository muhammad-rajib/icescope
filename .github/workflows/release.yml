name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installers and publish GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            label: macos-apple-silicon
          - platform: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            label: macos-intel
          - platform: windows-latest
            target: ""
            args: ""
            label: windows-x64
          - platform: ubuntu-22.04
            target: ""
            args: ""
            label: linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with official Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "IceScope ${{ github.ref_name }}"
          releaseBody: |
            ## Highlights

            - First public IceScope preview build.
            - Native installers for macOS, Windows, and Linux.

            ## Bug fixes

            - See CHANGELOG.md for the full change history.

            ## Known issues

            - REST Catalog, Glue, Hive Metastore, Nessie, GCS, and Azure workflows are documented/planned but not fully implemented.
            - Tauri updater support is prepared but not enabled.

            ## Checksums

            Checksums should be generated and attached before promoting this draft release.
          releaseDraft: true
          prerelease: true
