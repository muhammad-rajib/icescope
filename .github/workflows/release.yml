name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build installers and publish GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            label: macos-apple-silicon
          - platform: macos-13
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            label: macos-intel
          - platform: windows-latest
            target: ""
            args: ""
            label: windows-x64
          - platform: ubuntu-22.04
            target: ""
            args: ""
            label: linux-x64

    runs-on: ${{ matrix.platform }}
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: "-"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Import Apple Developer certificate
        if: startsWith(matrix.platform, 'macos') && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Resolve Apple signing identity
        if: startsWith(matrix.platform, 'macos') && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep -E '"(Developer ID Application|Apple Distribution|Apple Development):' | head -n 1 || true)
          if [ -z "$CERT_INFO" ]; then
            echo "No Apple signing identity found in build keychain."
            exit 1
          fi
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Using signing identity: $CERT_ID"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build with official Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "IceScope ${{ github.ref_name }}"
          releaseBody: |
            ## Highlights

            - First public IceScope preview build.
            - Native installers for macOS, Windows, and Linux.

            ## Installation

            Download and installation guide:
            https://muhammad-rajib.github.io/icescope/download/

            ## Bug fixes

            - See CHANGELOG.md for the full change history.

            ## Known issues

            - REST Catalog, Glue, Hive Metastore, Nessie, GCS, and Azure workflows are documented/planned but not fully implemented.
            - Tauri updater support is prepared but not enabled.

            ## Checksums

            SHA-256 checksums are attached as `SHA256SUMS.txt` when all platform jobs finish.
          releaseDraft: true
          prerelease: true

  checksums:
    name: Generate release checksums
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" --dir release-assets --clobber

      - name: Generate SHA256SUMS.txt
        run: |
          cd release-assets
          find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attach checksums to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" release-assets/SHA256SUMS.txt --clobber
