name: Bug report
description: Report a reproducible IceScope bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and sample paths when possible.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: IceScope version
      placeholder: "0.1.0"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows
        - Linux
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: text
